name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # VITE_GOOGLE_CLIENT_ID is baked into the web bundle at build time by Vite.
      - run: pnpm build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      - run: CI=true pnpm install --prod --frozen-lockfile

      # Same set of files the Dockerfile's runtime stage copies — see there
      # for why drizzle.config.ts/drizzle/ are needed alongside dist.
      #
      # Named uniquely per commit (not a fixed "release.tar.gz") — a stale
      # leftover from a previous failed run, owned by a different uid, once
      # blocked a later run's overwrite of that same fixed path with a
      # confusing "Permission denied" from the remote tar extraction.
      - name: Package release artifact
        run: |
          tar -czf release-${{ github.sha }}.tar.gz \
            pnpm-workspace.yaml package.json node_modules \
            packages/portifo-api/package.json \
            packages/portifo-api/node_modules \
            packages/portifo-api/dist \
            packages/portifo-api/drizzle.config.ts \
            packages/portifo-api/drizzle \
            packages/portifo-web/dist \
            deploy/migrate.sh

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: release-${{ github.sha }}.tar.gz
          target: /tmp
          overwrite: true

      - name: Extract, migrate, restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          shell: bash
          script: |
            exec > >(tee /tmp/portifo-deploy-debug.log) 2>&1
            set -ex
            DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
            RELEASE="$DEPLOY_PATH/releases/${{ github.sha }}"
            ARCHIVE="/tmp/release-${{ github.sha }}.tar.gz"

            mkdir -p "$RELEASE"
            tar -xzf "$ARCHIVE" -C "$RELEASE"
            rm -f "$ARCHIVE"
            chown -R portifo:portifo "$RELEASE"
            chmod +x "$RELEASE/deploy/migrate.sh"

            su -s /bin/bash portifo "$RELEASE/deploy/migrate.sh" "$RELEASE" "$DEPLOY_PATH"

            ln -sfn "$RELEASE" "$DEPLOY_PATH/current"
            systemctl restart portifo
            sleep 2
            systemctl is-active portifo

            cd "$DEPLOY_PATH/releases"
            ls -1t | tail -n +6 | xargs -r rm -rf --

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: CI=true pnpm install --prod --frozen-lockfile

      # Same set of files the Dockerfile's runtime stage copies — see there
      # for why drizzle.config.ts/drizzle/ are needed alongside dist.
      - name: Package release artifact
        run: |
          tar -czf release.tar.gz \
            pnpm-workspace.yaml package.json node_modules \
            packages/portifo-api/package.json \
            packages/portifo-api/node_modules \
            packages/portifo-api/dist \
            packages/portifo-api/drizzle.config.ts \
            packages/portifo-api/drizzle \
            packages/portifo-web/dist

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: release.tar.gz
          target: /tmp
          overwrite: true

      - name: Extract, migrate, restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -ex
            DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
            RELEASE="$DEPLOY_PATH/releases/${{ github.sha }}"

            mkdir -p "$RELEASE"
            tar -xzf /tmp/release.tar.gz -C "$RELEASE"
            rm -f /tmp/release.tar.gz
            chown -R portifo:portifo "$RELEASE"

            cat > /tmp/portifo-migrate.sh <<'SCRIPT'
            #!/bin/bash
            set -e
            cd "$1/packages/portifo-api"
            set -a
            source "$2/shared/.env"
            set +a
            ./node_modules/.bin/drizzle-kit migrate
            SCRIPT
            chmod +x /tmp/portifo-migrate.sh
            su -s /bin/bash portifo /tmp/portifo-migrate.sh "$RELEASE" "$DEPLOY_PATH"
            rm -f /tmp/portifo-migrate.sh

            ln -sfn "$RELEASE" "$DEPLOY_PATH/current"
            systemctl restart portifo
            sleep 2
            systemctl is-active portifo

            cd "$DEPLOY_PATH/releases"
            ls -1t | tail -n +6 | xargs -r rm -rf --

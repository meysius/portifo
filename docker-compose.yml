services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portifo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-portifo}
    volumes:
      - portifo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portifo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${IMAGE:-ghcr.io/meysius/portifo:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-portifo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-portifo}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:?set VAPID_PUBLIC_KEY in .env}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:?set VAPID_PRIVATE_KEY in .env}
      VAPID_CONTACT_EMAIL: ${VAPID_CONTACT_EMAIL:?set VAPID_CONTACT_EMAIL in .env}
    ports:
      - "${PORT:-3000}:3000"

  # One-off: `docker compose --profile tools run --rm migrate` to apply
  # Drizzle migrations. Reuses the same app image — drizzle-kit is a regular
  # (not dev) dependency of portifo-api specifically so it survives into the
  # production image and this doesn't need a separate build/target.
  migrate:
    image: ${IMAGE:-ghcr.io/meysius/portifo:latest}
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portifo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-portifo}
    command: ["./node_modules/.bin/drizzle-kit", "migrate"]

volumes:
  portifo_db_data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-portifo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-portifo}
    volumes:
      - portifo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portifo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-portifo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-portifo}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
    ports:
      - "${PORT:-3000}:3000"

  # One-off: `docker compose run --rm migrate` to apply Drizzle migrations.
  # Built from the pre-prune `build` stage, which still has drizzle-kit.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-portifo}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-portifo}
    command: ["pnpm", "--filter", "portifo-api", "db:migrate"]

volumes:
  portifo_db_data:
